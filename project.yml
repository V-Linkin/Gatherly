name: Archiver
options:
  bundleIdPrefix: com.archiver
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: Archiver
    INFOPLIST_FILE: Info.plist
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
    SWIFT_EMIT_LOC_STRINGS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Archiver:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Database
      - path: Parsers
      - path: Services
      - path: Utilities
      - path: Views
      - path: Assets.xcassets
      - path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archiver.app
        INFOPLIST_FILE: Info.plist
    dependencies:
      - package: GRDB
    scheme:
      testTargets: []

  ArchiverTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Archiver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archiver.app.tests
        INFOPLIST_FILE: Tests/Info.plist

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
